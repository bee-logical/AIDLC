# Bee-Logical SDLC — GitHub Actions PR gate (web-stack baseline).
#
# Runs the SAME deterministic gate as the local `/sdlc:run` — typecheck, lint, format, boundaries,
# build, test — so a remote-mode repo's PRs are enforced by CI. Drop this at `.github/workflows/ci.yml`.
#
# IMPORTANT — this workflow alone does NOT block merges. Mark the `gate` job a **required status
# check** in Branch protection for the default branch, or the gate is advisory only. `/sdlc:init`
# and `/sdlc:status` warn when a remote repo has no required-check policy.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    # Swap to a self-hosted label (e.g. [self-hosted, linux]) if you don't run on GitHub-hosted.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "." # poly: set to the repo's subdirectory
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc" # falls back to "22" if absent; keep in sync with engines
          cache: npm

      # `npm ci` is EXACT-lock. A lockfile generated on Windows/macOS can be unsatisfiable on Linux
      # (platform-specific optional deps: @emnapi/* / esbuild / swc / rollup natives). On failure,
      # regenerate the lockfile in a Linux context (see sdlc:ci-cd) — never loosen to `npm install`.
      - run: npm ci
        name: Install (npm ci)

      - run: npm run typecheck
        name: Type-check (tsc --noEmit)

      - run: npm run lint
        name: Lint (eslint)

      - run: npx prettier --check .
        name: Format (prettier --check .)

      # Boundary gate + non-empty-graph assertion — dependency-cruiser < 17 SILENTLY no-ops on .ts
      # (0 modules analyzed → green while enforcing nothing). Fail loud if 0 .ts modules analyzed.
      - name: Boundaries (depcruise + non-empty-graph assertion)
        run: |
          npx depcruise src
          TS=$(npx depcruise src --output-type json | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const j=JSON.parse(d);process.stdout.write(String(j.modules.filter(m=>/\.tsx?$/.test(m.source)).length))}catch(e){process.stdout.write("0")}})')
          echo "dependency-cruiser analyzed $TS TypeScript module(s)."
          if [ "$TS" -eq 0 ]; then
            echo "::error::Boundary gate is INERT — depcruise analyzed 0 .ts modules. Pin dependency-cruiser@^17."
            exit 1
          fi

      - run: npm run build --if-present
        name: Build

      - run: npm test
        name: Test

  # ───────────────────────────────────────────────────────────────────────────────────────────
  # POLY + a cross-repo package dependency (shared `@beelogical/dev-config`)? CI checks out ONE
  # repo, so an unpublished `file:../sibling` link is ABSENT and every config it sources fails.
  # Fix: (A) PUBLISH the shared package (GitHub Packages / registry) — REQUIRED for transitive/built
  # deps; or (B) MULTI-REPO CHECKOUT — add a second `actions/checkout` with `repository:` +
  # `path: ../<sibling>`, then `npm ci` the sibling (guard husky `prepare`). See
  # sdlc-stack-web:project-structure → cross-repo dependencies and sdlc:ci-cd.
  # ───────────────────────────────────────────────────────────────────────────────────────────
